const COLORS = ["#1f77b4", "#d62728", "#2ca02c", "#9467bd", "#ff7f0e"];
function formatPrice(p) { const n = Number(p); if (!n) return "-"; return n.toLocaleString("ko-KR") + "원"; }

function renderSubtitle() {
  const m = SNAPSHOT.meta;
  document.getElementById("subtitle").textContent =
    `한국 · 네이버 검색 + 쇼핑 · 기간 ${m.period.start} ~ ${m.period.end} · 빌드 ${new Date(m.fetchedAt).toLocaleString("ko-KR")}`;
}
function renderLineChart(canvasId, results) {
  const labels = (results[0]?.data || []).map(d => d.period);
  const datasets = results.map((r, i) => ({
    label: r.title,
    data: r.data.map(d => d.ratio),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.25, borderWidth: 2, pointRadius: 2,
  }));
  new Chart(document.getElementById(canvasId), {
    type: "line", data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: { x: { ticks: { font: { size: 10 } } }, y: { beginAtZero: true, ticks: { font: { size: 10 } } } }
    }
  });
}
function renderKpis() {
  const all = [...SNAPSHOT.search.results, ...SNAPSHOT.category.results];
  const kpis = all.map(r => {
    const d = r.data || [];
    const last = d[d.length-1]?.ratio || 0;
    const prev = d[d.length-2]?.ratio || 0;
    const delta = prev ? ((last - prev) / prev * 100) : 0;
    return { name: r.title, last: last.toFixed(1), delta };
  });
  document.getElementById("kpis").innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="k">${k.name}</div>
      <div class="v">${k.last}</div>
      <div class="d ${k.delta>=0?'up':'down'}">${k.delta>=0?'▲':'▼'} ${Math.abs(k.delta).toFixed(1)}%</div>
    </div>
  `).join("");
}
function renderProducts() {
  const items = SNAPSHOT.products;
  const data = items.map((it, i) => [
    i+1,
    it.image ? `<img class="product-img" src="${it.image}" alt="" loading="lazy" />` : "",
    `<a href="${it.link}" target="_blank" rel="noopener">${it.title}</a><div style="font-size:11px;color:#888;margin-top:2px">${[it.category2, it.category3].filter(Boolean).join(" › ")}</div>`,
    it.mallName || "-",
    it.brand || it.maker || "-",
    `<span class="price">${formatPrice(it.lprice)}</span>`,
  ]);
  new gridjs.Grid({
    columns: [
      { name: "#", width: "40px" },
      { name: "이미지", width: "60px", formatter: (c) => gridjs.html(c) },
      { name: "상품", formatter: (c) => gridjs.html(c) },
      { name: "판매처", width: "100px" },
      { name: "브랜드", width: "120px" },
      { name: "최저가", width: "100px", formatter: (c) => gridjs.html(c) },
    ],
    data, sort: true, search: true, pagination: { limit: 10 },
    language: { search: { placeholder: "검색…" }, pagination: { previous: "이전", next: "다음", showing: "표시", to: "/", of: "전체" } }
  }).render(document.getElementById("productGrid"));
}
function renderNews() {
  const items = SNAPSHOT.news;
  document.getElementById("newsList").innerHTML = `<div class="news-list">` + items.map(it => `
    <div class="news-card">
      <a href="${it.link}" target="_blank" rel="noopener">${it.title}</a>
      <div class="date">${new Date(it.pubDate).toLocaleString("ko-KR")}</div>
      <div class="desc">${it.description}</div>
    </div>
  `).join("") + `</div>`;
}

if (SNAPSHOT) {
  renderSubtitle();
  renderKpis();
  renderLineChart("searchChart", SNAPSHOT.search.results);
  renderLineChart("catChart", SNAPSHOT.category.results);
  renderProducts();
  renderNews();
} else {
  document.body.innerHTML = "<p style='padding:40px;text-align:center;color:#888'>SNAPSHOT 데이터가 비어 있습니다. <code>python scripts/refresh.py</code> 를 먼저 실행해 빌드해주세요.</p>";
}
</script>
