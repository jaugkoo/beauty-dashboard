<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>뷰티/화장품 일일 트렌드 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif; }
  body { padding: 16px 20px 40px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 16px; }
  .panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 14px; margin: 0 0 12px; color: #333; letter-spacing: 0.2px; }
  .panel h2 .badge { font-size: 11px; background: #eef; color: #335; padding: 2px 8px; border-radius: 10px; margin-left: 8px; font-weight: 500; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .kpi { background: #f7f7f9; border-radius: 10px; padding: 12px 14px; }
  .kpi .k { font-size: 11px; color: #777; }
  .kpi .v { font-size: 18px; font-weight: 600; margin-top: 4px; }
  .kpi .d { font-size: 11px; margin-top: 2px; }
  .kpi .d.up { color: #c00; } .kpi .d.down { color: #06a; }
  canvas { max-height: 320px; }
  .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 880px) { .grid-two { grid-template-columns: 1fr; } }
  .news-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 720px) { .news-list { grid-template-columns: 1fr; } }
  .news-card { border: 1px solid #ececec; border-radius: 10px; padding: 10px 12px; background: #fff; }
  .news-card a { color: #0b3d91; text-decoration: none; font-weight: 600; font-size: 13px; }
  .news-card .date { font-size: 11px; color: #888; margin: 4px 0; }
  .news-card .desc { font-size: 12px; color: #444; line-height: 1.4; }
  .product-img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; }
  .gridjs-wrapper { box-shadow: none !important; }
  .gridjs-table { font-size: 12px; }
  .price { font-variant-numeric: tabular-nums; font-weight: 600; }
  footer { color: #999; font-size: 11px; text-align: center; margin-top: 24px; }
  footer a { color: #999; }
</style>
</head>
<body>
<h1>뷰티/화장품 일일 트렌드 대시보드</h1>
<div class="subtitle" id="subtitle"></div>

<div class="panel">
  <h2>오늘의 시그널 (전일 대비)</h2>
  <div id="kpis" class="kpis"></div>
</div>

<div class="grid-two">
  <div class="panel">
    <h2>네이버 검색 트렌드 <span class="badge">datalab_search</span></h2>
    <canvas id="searchChart"></canvas>
  </div>
  <div class="panel">
    <h2>쇼핑 카테고리 트렌드 <span class="badge">datalab_shopping_category</span></h2>
    <canvas id="catChart"></canvas>
  </div>
</div>

<div class="panel">
  <h2>네이버 쇼핑 Top N <span class="badge">search_shop</span></h2>
  <div id="productGrid"></div>
</div>

<div class="panel">
  <h2>관련 뉴스 (최신순) <span class="badge">search_news</span></h2>
  <div id="newsList"></div>
</div>

<footer>
  Generated by GitHub Actions · <a href="https://github.com/" target="_blank" rel="noopener">view source</a>
</footer>

<script>
// __SNAPSHOT_PLACEHOLDER__ 는 빌드 시 scripts/refresh.py가 실제 JSON으로 치환합니다.
const SNAPSHOT = /* __SNAPSHOT_PLACEHOLDER__ */ null;

const COLORS = ["#1f77b4", "#d62728", "#2ca02c", "#9467bd", "#ff7f0e"];
function formatPrice(p) { const n = Number(p); if (!n) return "-"; return n.toLocaleString("ko-KR") + "원"; }

function renderSubtitle() {
  const m = SNAPSHOT.meta;
  document.getElementById("subtitle").textContent =
    `한국 · 네이버 검색 + 쇼핑 · 기간 ${m.period.start} ~ ${m.period.end} · 빌드 ${new Date(m.fetchedAt).toLocaleString("ko-KR")}`;
}
function renderLineChart(canvasId, results) {
  const labels = (results[0]?.data || []).map(d => d.period);
  const datasets = results.map((r, i) => ({
    label: r.title,
    data: r.data.map(d => d.ratio),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.25, borderWidth: 2, pointRadius: 2,
  }));
  new Chart(document.getElementById(canvasId), {
    type: "line", data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: { x: { ticks: { font: { size: 10 } } }, y: { beginAtZero: true, ticks: { font: { size: 10 } } } }
    }
  });
}
function renderKpis() {
  const all = [...SNAPSHOT.search.results, ...SNAPSHOT.category.results];
  const kpis = all.map(r => {
    const d = r.data || [];
    const last = d[d.length-1]?.ratio || 0;
    const prev = d[d.length-2]?.ratio || 0;
    const delta = prev ? ((last - prev) / prev * 100) : 0;
    return { name: r.title, last: last.toFixed(1), delta };
  });
  document.getElementById("kpis").innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="k">${k.name}</div>
      <div class="v">${k.last}</div>
      <div class="d ${k.delta>=0?'up':'down'}">${k.delta>=0?'▲':'▼'} ${Math.abs(k.delta).toFixed(1)}%</div>
    </div>
  `).join("");
}
function renderProducts() {
  const items = SNAPSHOT.products;
  const data = items.map((it, i) => [
    i+1,
    it.image ? `<img class="product-img" src="${it.image}" alt="" loading="lazy" />` : "",
    `<a href="${it.link}" target="_blank" rel="noopener">${it.title}</a><div style="font-size:11px;color:#888;margin-top:2px">${[it.category2, it.category3].filter(Boolean).join(" › ")}</div>`,
    it.mallName || "-",
    it.brand || it.maker || "-",
    `<span class="price">${formatPrice(it.lprice)}</span>`,
  ]);
  new gridjs.Grid({
    columns: [
      { name: "#", width: "40px" },
      { name: "이미지", width: "60px", formatter: (c) => gridjs.html(c) },
      { name: "상품", formatter: (c) => gridjs.html(c) },
      { name: "판매처", width: "100px" },
      { name: "브랜드", width: "120px" },
      { name: "최저가", width: "100px", formatter: (c) => gridjs.html(c) },
    ],
    data, sort: true, search: true, pagination: { limit: 10 },
    language: { search: { placeholder: "검색…" }, pagination: { previous: "이전", next: "다음", showing: "표시", to: "/", of: "전체" } }
  }).render(document.getElementById("productGrid"));
}
function renderNews() {
  const items = SNAPSHOT.news;
  document.getElementById("newsList").innerHTML = `<div class="news-list">` + items.map(it => `
    <div class="news-card">
      <a href="${it.link}" target="_blank" rel="noopener">${it.title}</a>
      <div class="date">${new Date(it.pubDate).toLocaleString("ko-KR")}</div>
      <div class="desc">${it.description}</div>
    </div>
  `).join("") + `</div>`;
}

if (SNAPSHOT) {
  renderSubtitle();
  renderKpis();
  renderLineChart("searchChart", SNAPSHOT.search.results);
  renderLineChart("catChart", SNAPSHOT.category.results);
  renderProducts();
  renderNews();
} else {
  document.body.innerHTML = "<p style='padding:40px;text-align:center;color:#888'>SNAPSHOT 데이터가 비어 있습니다. <code>python scripts/refresh.py</code> 를 먼저 실행해 빌드해주세요.</p>";
}
</script>
</body>
</html>
